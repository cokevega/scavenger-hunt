<h1>Register</h1>
<form>
    <label for="name">Name:</label>
    <input type="text" [formControl]="name" name="name" id="name"><br/>
    <span class="error" *ngIf="nameError">Name is required<br/></span>
    <label for="lastName">Last name:</label>
    <input type="text" name="lastName" id="lastName"><br/>
    <label for="email">E-mail:</label>
    <input type="text" [formControl]="email" name="email" id="email"><br/>
    <span class="error" *ngIf="emailError">Email is required on a valid format<br/></span>
</form>
    <input type="checkbox" [formControl]="terms" name="terms" id="terms">
    <label for="terms">I accept the terms and conditions</label><br/>
    <span class="error" *ngIf="termsError">You must accept the terms and conditions<br/></span>
    <button type="button" (click)="validateForm()">Play!</button>
<div>
    <p>Name: {{name.valid}}</p>
    <p>Email: {{email.valid}}</p>
    <p>Terms: {{terms.valid}}</p>
</div>
